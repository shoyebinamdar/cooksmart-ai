server:
  # Render sets PORT; local/dev uses SERVER_PORT or 8080
  port: ${PORT:${SERVER_PORT:8080}}
  error:
    include-message: never
    include-binding-errors: never

spring:
  application:
    name: cooksmart-ai
  datasource:
    # Prefer discrete DB_* vars (Render). DATABASE_URL is converted by DatabaseUrlEnvironmentPostProcessor.
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cooksmart}${DB_SSL_QUERY:}
    username: ${DB_USER:cooksmart}
    password: ${DB_PASSWORD:cooksmart}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        format_sql: true
    show-sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

cooksmart:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8080}
  ai:
    enabled: ${AI_ENABLED:true}
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:20}
  currency:
    symbol: ${CURRENCY_SYMBOL:₹}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    root: INFO
    com.cooksmart: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
