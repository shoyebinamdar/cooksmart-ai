services:
  db:
    image: postgres:16-alpine
    container_name: cooksmart-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cooksmart}
      POSTGRES_USER: ${POSTGRES_USER:-cooksmart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cooksmart}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - cooksmart_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cooksmart} -d ${POSTGRES_DB:-cooksmart}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: cooksmart-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-cooksmart}
      DATABASE_USERNAME: ${POSTGRES_USER:-cooksmart}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-cooksmart}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-cooksmart}
      DB_USER: ${POSTGRES_USER:-cooksmart}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-cooksmart}
      DB_SSL_QUERY: ""
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AI_ENABLED: ${AI_ENABLED:-true}
      CURRENCY_SYMBOL: ${CURRENCY_SYMBOL:-₹}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: cooksmart-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  cooksmart_pgdata:
