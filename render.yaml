services:
  - type: web
    name: cooksmart-ai
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      # Discrete DB vars (most reliable on Render)
      - key: DB_HOST
        fromDatabase:
          name: cooksmart-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: cooksmart-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: cooksmart-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: cooksmart-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cooksmart-db
          property: password
      - key: DB_SSL_QUERY
        value: "?sslmode=require"
      # Also provide connection string for the JDBC URL converter
      - key: DATABASE_URL
        fromDatabase:
          name: cooksmart-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: AI_ENABLED
        value: "true"
      - key: CURRENCY_SYMBOL
        value: "₹"
      - key: LOG_LEVEL
        value: INFO
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: cooksmart-db
    plan: free
    databaseName: cooksmart
    user: cooksmart
